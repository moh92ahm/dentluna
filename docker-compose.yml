version: '3.9'

services:
  payload:
    image: node:20-alpine
    ports:
      - '3000:3000'
    volumes:
      - .:/home/node/app
      - node_modules:/home/node/app/node_modules
      - media:/home/node/app/public/media
    working_dir: /home/node/app/
    command: sh -c "corepack enable && corepack prepare pnpm@latest --activate && pnpm install && pnpm dev"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env

  # Ensure DATABASE_URL uses "postgres" as hostname, e.g.
  # postgresql://dentluna_user:dentluna_password@postgres:5432/dentluna?sslmode=disable
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dentluna
      POSTGRES_USER: dentluna_user
      POSTGRES_PASSWORD: dentluna_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dentluna_user -d dentluna']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  media:
  node_modules:
